<!DOCTYPE html>
<html>
<head>
<title>Download Documents</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Available Documents</h1>
<div id="files"></div>

<script>
fetch('/files')
.then(res => res.json())
.then(data => {
    const div = document.getElementById('files');
    data.forEach(file => {
        div.innerHTML += `<a href="/DOCUMENTS/${file}" target="_blank">${file}</a><br>`;
    });
});
</script>

</body>
</html>
