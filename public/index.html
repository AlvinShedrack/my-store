<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download Documents</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Available Documents</h1>

<div id="files" class="form-container"></div>

<script>
fetch('/files')
.then(res => res.json())
.then(data => {
    const div = document.getElementById('files');
    div.innerHTML = ''; // clear container first
    data.forEach(file => {
        const name = file.split('/').pop();
        const link = document.createElement('a');
        link.href = file;
        link.target = '_blank';
        link.textContent = name;
        div.appendChild(link);
    });
});
</script>

</body>
</html>
